<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Medication Reference Guide</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .accordion-content {
            transition: max-height 0.3s ease-in-out, opacity 0.3s ease-in-out, padding 0.3s ease-in-out;
            max-height: 0;
            opacity: 0;
            overflow: hidden;
        }
        .accordion-content.expanded {
            max-height: 2000px; /* Arbitrary large height to accommodate content */
            opacity: 1;
        }
        .med-card {
            transition: all 0.2s ease-in-out;
        }
        .med-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans antialiased selection:bg-blue-200 selection:text-blue-900">

    <!-- Sticky Header -->
    <header class="sticky top-0 z-50 bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
            <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
                <div class="flex items-center gap-3">
                    <div class="bg-blue-600 p-2 rounded-lg text-white">
                        <i data-lucide="cross"></i>
                    </div>
                    <h1 class="text-xl md:text-2xl font-bold text-gray-900">Medication Reference Guide</h1>
                </div>
                
                <!-- Search Bar -->
                <div class="relative w-full md:w-96">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i data-lucide="search" class="text-gray-400 w-5 h-5"></i>
                    </div>
                    <input 
                        type="text" 
                        id="searchInput" 
                        class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg leading-5 bg-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 sm:text-sm transition-colors" 
                        placeholder="Search medications, categories, or indications..."
                    >
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Controls -->
        <div class="flex justify-between items-center mb-6">
            <p class="text-sm text-gray-500" id="resultsCount">Showing all medications</p>
            <button id="expandAllBtn" class="text-sm font-medium text-blue-600 hover:text-blue-800 transition-colors">
                Expand All Categories
            </button>
        </div>

        <div id="medicationContainer" class="space-y-6">
            <!-- Categories will be injected here via JS -->
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="hidden text-center py-12">
            <i data-lucide="search-x" class="mx-auto h-12 w-12 text-gray-400 mb-4"></i>
            <h3 class="text-lg font-medium text-gray-900">No medications found</h3>
            <p class="mt-1 text-gray-500">Try adjusting your search terms.</p>
        </div>
    </main>

                                        ${med.details
                                            .map(
                                                (detail) => `
                                            <div class="rounded-lg border border-gray-100 bg-white p-3">
                                                <h4 class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-1 flex items-center gap-1">
                                                    ${
                                                        detail.icon
                                                            ? `<i data-lucide="${detail.icon}" class="w-3 h-3"></i>`
                                                            : ""
                                                    }
                                                    ${detail.title}
                                                </h4>
                                                <div class="text-sm text-gray-700">${detail.content}</div>
                                            </div>
                                        `
                                            )
                                            .join("")}
                                    </div>
                                `
                                        : ""
                                }
                            </div>
                        </div>
                    `;
                    medList.appendChild(medItem);
                });

                catDiv.appendChild(medList);
                container.appendChild(catDiv);
            });

            resultsCount.textContent = `Showing ${totalMeds} medications`;
            if (window.lucide && typeof window.lucide.createIcons === "function") {
                window.lucide.createIcons();
            }
        }

        // Accordion Logic
        window.toggleAccordion = function(button) {
            const content = button.nextElementSibling;
            const icon =
                button.querySelector('.chevron-icon') ||
                button.querySelector('[data-lucide="chevron-down"]') ||
                button.querySelector('svg');
            
            if (content.classList.contains('expanded')) {
                content.classList.remove('expanded');
                if (icon) icon.style.transform = 'rotate(0deg)';
                content.style.paddingTop = '0';
                content.style.paddingBottom = '0';
            } else {
                content.classList.add('expanded');
                if (icon) icon.style.transform = 'rotate(180deg)';
                content.style.paddingTop = '1rem';
                content.style.paddingBottom = '1rem';
            }
        };

        // Expand/Collapse All
        expandAllBtn.addEventListener('click', () => {
            const contents = document.querySelectorAll('.accordion-content');
            
            allExpanded = !allExpanded;
            
            contents.forEach((content) => {
                const button = content.previousElementSibling;
                const icon =
                    (button && button.querySelector('.chevron-icon')) ||
                    (button && button.querySelector('[data-lucide="chevron-down"]')) ||
                    (button && button.querySelector('svg'));
                if (allExpanded) {
                    content.classList.add('expanded');
                    content.style.paddingTop = '1rem';
                    content.style.paddingBottom = '1rem';
                    if (icon) icon.style.transform = 'rotate(180deg)';
                } else {
                    content.classList.remove('expanded');
                    content.style.paddingTop = '0';
                    content.style.paddingBottom = '0';
                    if (icon) icon.style.transform = 'rotate(0deg)';
                }
            });

            expandAllBtn.textContent = allExpanded ? "Collapse All Categories" : "Expand All Categories";
        });

        // Search Filter Logic
        searchInput.addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            
            if (!searchTerm) {
                renderMedications(medData);
                return;
            }

            const filteredData = medData.map(category => {
                // Check if category name matches
                const catMatch = category.category.toLowerCase().includes(searchTerm);
                
                // Filter medications
                const matchedMeds = category.medications.filter((med) => {
                    if (catMatch) return true;

                    const detailsText = (med.details || [])
                        .map((detail) => `${detail.title} ${detail.content}`)
                        .join(" ");
                    const haystack = [
                        med.name,
                        med.forms,
                        med.ind,
                        med.dose,
                        med.contra,
                        med.protip,
                        detailsText
                    ]
                        .filter(Boolean)
                        .join(" ")
                        .toLowerCase();

                    return haystack.includes(searchTerm);
                });

                return {
                    ...category,
                    medications: matchedMeds
                };
            }).filter(category => category.medications.length > 0);

            renderMedications(filteredData);
            
            // Automatically expand results during search for better UX
            if (searchTerm.length > 1 && filteredData.length > 0) {
                 setTimeout(() => {
                    const contents = document.querySelectorAll('.accordion-content');
                    contents.forEach((content) => {
                        const button = content.previousElementSibling;
                        const icon =
                            (button && button.querySelector('.chevron-icon')) ||
                            (button && button.querySelector('[data-lucide="chevron-down"]')) ||
                            (button && button.querySelector('svg'));
                        content.classList.add('expanded');
                        content.style.paddingTop = '1rem';
                        content.style.paddingBottom = '1rem';
                        if (icon) icon.style.transform = 'rotate(180deg)';
                    });
                    allExpanded = true;
                    expandAllBtn.textContent = "Collapse All Categories";
                 }, 50);
            }
        });

        // Initial Render
        renderMedications(medData);
    </script>
</body>
</html>
