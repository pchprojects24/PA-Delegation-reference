<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Medication Reference Guide</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .accordion-content {
            transition: max-height 0.3s ease-in-out, opacity 0.3s ease-in-out, padding 0.3s ease-in-out;
            max-height: 0;
            opacity: 0;
            overflow: hidden;
        }
        .accordion-content.expanded {
            max-height: 2000px; /* Arbitrary large height to accommodate content */
            opacity: 1;
        }
        .med-card {
            transition: all 0.2s ease-in-out;
        }
        .med-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans antialiased selection:bg-blue-200 selection:text-blue-900">

    <!-- Sticky Header -->
    <header class="sticky top-0 z-50 bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
            <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
                <div class="flex items-center gap-3">
                    <div class="bg-blue-600 p-2 rounded-lg text-white">
                        <i data-lucide="cross"></i>
                    </div>
                    <h1 class="text-xl md:text-2xl font-bold text-gray-900">Medication Reference Guide</h1>
                </div>
                
                <!-- Search Bar -->
                <div class="relative w-full md:w-96">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i data-lucide="search" class="text-gray-400 w-5 h-5"></i>
                    </div>
                    <input 
                        type="text" 
                        id="searchInput" 
                        class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg leading-5 bg-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 sm:text-sm transition-colors" 
                        placeholder="Search medications, categories, or indications..."
                    >
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Controls -->
        <div class="flex justify-between items-center mb-6">
            <p class="text-sm text-gray-500" id="resultsCount">Showing all medications</p>
            <button id="expandAllBtn" class="text-sm font-medium text-blue-600 hover:text-blue-800 transition-colors">
                Expand All Categories
            </button>
        </div>

        <div id="medicationContainer" class="space-y-6">
            <!-- Categories will be injected here via JS -->
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="hidden text-center py-12">
            <i data-lucide="search-x" class="mx-auto h-12 w-12 text-gray-400 mb-4"></i>
            <h3 class="text-lg font-medium text-gray-900">No medications found</h3>
            <p class="mt-1 text-gray-500">Try adjusting your search terms.</p>
        </div>
    </main>

            },
            {
                category: "Obstetrical & Gynecological",
                medications: [
                    { name: "Canesten + Fluconazole", forms: "Vaginal cream/suppository + Oral Tab (150mg)", ind: "Vulvovaginal Candidiasis (Yeast infection)", dose: "Fluconazole 150mg PO x 1. Canesten applied locally.", contra: "Pregnancy (for oral Fluconazole—use topical only).", protip: "Oral Fluconazole is contraindicated in pregnancy. If pregnant, the patient must use 7 days of topical clotrimazole/miconazole." }
                ]
            },
            {
                category: "Ophthalmic",
                medications: [
                    { name: "Erythromycin ointment", forms: "Ophthalmic ointment (0.5%)", ind: "Bacterial conjunctivitis, corneal abrasion prophylaxis", dose: "1 cm ribbon to lower lid qid.", contra: "Hypersensitivity.", protip: "Ointments blur vision. Advise patients not to drive immediately after application. Apply to the inner lower lid, without touching the tube to the eye." },
                    { name: "Gramicidin-Polymyxin B (Polysporin eye drops)", forms: "Eye drops", ind: "Bacterial conjunctivitis", dose: "1-2 drops q3-4h.", contra: "Viral/fungal eye infections.", protip: "Good first-line agent. If the patient wears contacts, they must stop wearing them and switch to Ciprofloxacin/Ofloxacin drops to cover Pseudomonas." },
                    { name: "Fluorescein", forms: "Strips/Drops", ind: "Detection of corneal abrasions/ulcers", dose: "1 drop/strip applied to conjunctiva.", contra: "None.", protip: "Use with a Wood's lamp or Cobalt blue light. Abrasions will glow bright green. Remove contact lenses before use, as it permanently stains soft lenses." },
                    { name: "Lubricating ointment", forms: "Ointment/Drops", ind: "Dry eyes, Bell's Palsy eye protection", dose: "Apply as needed.", contra: "None.", protip: "Crucial for patients with Bell's Palsy to prevent corneal drying and ulceration since they cannot blink or close the eye fully." }
                ]
            },
            {
                category: "Respiratory",
                medications: [
                    { name: "Salbutamol (Albuterol/Ventolin)", forms: "MDI, Nebulizer solution (2.5-5mg)", ind: "Asthma, COPD, bronchospasm, hyperkalemia", dose: "2.5-5 mg nebulized q20min. MDI: 4-8 puffs.", contra: "Severe tachycardia (relative).", protip: "It is a beta-2 agonist but has some beta-1 crossover. It will cause tachycardia and tremors; reassure the patient this is a normal side effect." },
                    { name: "Beclomethasone dip", forms: "MDI (QVAR)", ind: "Maintenance asthma therapy", dose: "1-2 puffs bid.", contra: "Acute asthma attack.", protip: "This is a preventer, not a reliever. Patient MUST rinse their mouth after use to prevent oral thrush (candidiasis)." },
                    { name: "Lidocaine endotracheal spray", forms: "LMA spray (10mg/dose)", ind: "Topical anesthesia for intubation/bronchoscopy", dose: "1-2 sprays to vocal cords.", contra: "Amide anesthetic allergy.", protip: "Suppresses the gag/cough reflex. Patient must be strictly NPO until numbness wears off to prevent aspiration." }
                ]
            },
            {
                category: "IV Fluids, Blood Products, Electrolytes",
                medications: [
                    { name: "Naloxone (Narcan)", forms: "Vial (0.4mg/mL, 2mg/2mL), Nasal Spray", ind: "Opioid overdose", dose: "0.4 - 2 mg IV/IM/IN q2-3min.", contra: "None in overdose.", protip: "The half-life of Naloxone (~30-60 mins) is shorter than most opioids. Monitor closely for re-sedation after the patient wakes up." },
                    { name: "Flumazenil", forms: "Vial (0.1mg/mL)", ind: "Benzodiazepine reversal (iatrogenic)", dose: "0.2 mg IV over 15 sec.", contra: "Chronic benzo users, TCA overdose, seizure history.", protip: "Rarely used in the ED for unknown overdoses because if the patient is a chronic benzo user, reversing it can cause intractable, fatal seizures." },
                    { name: "Dextrose (D50W)", forms: "Pre-filled syringe (25g/50mL)", ind: "Severe hypoglycemia", dose: "1 ampule (25g) IV push.", contra: "No IV access.", protip: "Highly hypertonic. Extravasation causes severe tissue necrosis. Ensure a perfectly patent IV line before pushing." },
                    { name: "Lactated Ringer’s", forms: "IV Bag", ind: "Resuscitation, trauma, burns", dose: "Bolus or continuous.", contra: "Severe hyperkalemia, liver failure (can't process lactate).", protip: "More physiologic than Normal Saline. Preferred in trauma and large volume resuscitation to prevent hyperchloremic metabolic acidosis." },
                    { name: "NaCl 0.9% (Normal Saline)", forms: "IV Bag", ind: "Resuscitation, hydration", dose: "Bolus or continuous.", contra: "Fluid overload, CHF.", protip: "Despite the name, it is not 'normal' (pH is ~5.5, chloride is 154). Large volumes can cause hyperchloremic non-anion gap metabolic acidosis." },
                    { name: "Thiamine (B1)", forms: "Vial (100mg/mL)", ind: "Wernicke's encephalopathy, chronic alcoholism", dose: "100 mg IV/IM.", contra: "None.", protip: "In alcoholic or malnourished patients, ALWAYS give Thiamine before or alongside IV Dextrose to prevent precipitating Wernicke's encephalopathy." },
                    { name: "Calcium gluconate", forms: "Vial (10%)", ind: "Severe Hyperkalemia, Calcium channel blocker overdose", dose: "1-2 g IV over 5-10 mins.", contra: "Digoxin toxicity (relative), hypercalcemia.", protip: "Does NOT lower potassium levels. It solely stabilizes the cardiac membrane to prevent fatal arrhythmias while other drugs work." },
                    { name: "Magnesium Sulphate", forms: "Vial (50%)", ind: "Torsades de Pointes, Severe asthma, Eclampsia", dose: "Asthma/Torsades: 2 g IV over 10-20 min. Eclampsia: 4 g IV.", contra: "Heart block, renal failure.", protip: "Watch for loss of deep tendon reflexes and respiratory depression. The antidote is Calcium Gluconate." },
                    { name: "Sodium Bicarbonate", forms: "Pre-filled syringe (50mEq/50mL)", ind: "TCA Overdose, Severe Metabolic Acidosis, Hyperkalemia", dose: "1-2 ampules (50-100 mEq) IV push.", contra: "Alkalosis.", protip: "In TCA overdose with widened QRS, push bicarb until the QRS narrows. It works via sodium channel loading and alkalinization." },
                    { name: "Cyanokit (Hydroxocobalamin)", forms: "Vial (5g)", ind: "Cyanide toxicity (smoke inhalation in house fires)", dose: "5 g IV infusion over 15 mins.", contra: "None in suspected CN toxicity.", protip: "Will instantly turn the patient's skin, mucous membranes, and urine bright cherry red for days. This is normal." }
                ]
            },
            {
                category: "Controlled Substances — Narcotics",
                medications: [
                    { name: "Morphine Sulphate", forms: "Vial (10mg/mL)", ind: "Severe pain", dose: "2-5 mg IV q5-15min PRN.", contra: "Hypotension, respiratory depression.", protip: "Causes histamine release, leading to flushing, itching, and transient drops in blood pressure (not a true allergy)." },
                    { name: "Ketamine", forms: "Vial (50mg/mL)", ind: "Severe pain, Procedural Sedation, Excited Delirium", dose: "Analgesia: 0.1-0.3 mg/kg IV. Sedation: 1-2 mg/kg IV.", contra: "Schizophrenia (relative).", protip: "Preserves airway reflexes and blood pressure, making it incredibly safe hemodynamically. Can cause vivid emergence nightmares." },
                    { name: "Fentanyl", forms: "Vial (50mcg/mL)", ind: "Severe pain, RSI premedication", dose: "1-2 mcg/kg IV.", contra: "Respiratory depression.", protip: "100x more potent than morphine but much faster acting with a shorter duration. Pushing rapidly can cause rare but fatal chest wall rigidity." }
                ]
            },
            {
                category: "Controlled Substances — Benzodiazepines",
                medications: [
                    { name: "Diazepam (Valium)", forms: "Vial (5mg/mL), Tablets", ind: "Status epilepticus, muscle spasm, alcohol withdrawal", dose: "5-10 mg IV/PO.", contra: "Respiratory depression, narrow-angle glaucoma.", protip: "Has active metabolites with a very long half-life (up to 100 hours). May accumulate in the elderly." },
                    { name: "Midazolam (Versed)", forms: "Vial (1mg/mL, 5mg/mL)", ind: "Procedural sedation, status epilepticus, extreme agitation", dose: "Sedation: 1-2 mg IV slow push. Seizure: 5-10 mg IM.", contra: "Shock, respiratory depression.", protip: "Excellent amnesic properties. It is short-acting but causes significant respiratory depression; always have airway equipment ready." },
                    { name: "Lorazepam (Ativan)", forms: "Vial (2mg/mL, 4mg/mL), Tablets/SL", ind: "Status epilepticus, severe anxiety, alcohol withdrawal", dose: "Seizure: 2-4 mg IV.", contra: "Respiratory depression.", protip: "The drug of choice for status epilepticus due to its fast onset and longer duration of action in the brain compared to diazepam." }
                ]
            }
        ];

        const container = document.getElementById('medicationContainer');
        const searchInput = document.getElementById('searchInput');
        const emptyState = document.getElementById('emptyState');
        const resultsCount = document.getElementById('resultsCount');
        const expandAllBtn = document.getElementById('expandAllBtn');
        let allExpanded = false;

        // Render function
        function renderMedications(data) {
            container.innerHTML = '';
            let totalMeds = 0;

            if (data.length === 0) {
                emptyState.classList.remove('hidden');
                resultsCount.textContent = "0 medications found";
                return;
            } else {
                emptyState.classList.add('hidden');
            }

            data.forEach(category => {
                if (category.medications.length === 0) return;

                const catDiv = document.createElement('div');
                catDiv.className = 'bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden mb-6';
                
                const catHeader = document.createElement('div');
                catHeader.className = 'bg-gray-50 border-b border-gray-200 px-6 py-4 flex justify-between items-center';
                catHeader.innerHTML = `
                    <h2 class="text-xl font-bold text-gray-800 flex items-center gap-2">
                        <i data-lucide="folder-tree" class="w-5 h-5 text-blue-600"></i>
                        ${category.category}
                    </h2>
                    <span class="bg-blue-100 text-blue-800 text-xs font-semibold px-2.5 py-0.5 rounded-full">${category.medications.length} Meds</span>
                `;
                catDiv.appendChild(catHeader);

                const medList = document.createElement('div');
                medList.className = 'divide-y divide-gray-100';

                category.medications.forEach(med => {
                    totalMeds++;
                    const medItem = document.createElement('div');
                    medItem.className = 'med-card group';
                    
                    medItem.innerHTML = `
                        <button class="w-full text-left px-6 py-4 focus:outline-none hover:bg-gray-50 flex justify-between items-center" onclick="toggleAccordion(this)">
                            <div>
                                <h3 class="text-lg font-semibold text-gray-900 group-hover:text-blue-600 transition-colors">${med.name}</h3>
                                <p class="text-sm text-gray-500 mt-1 line-clamp-1">${med.ind}</p>
                            </div>
                            <i data-lucide="chevron-down" class="chevron-icon w-5 h-5 text-gray-400 transform transition-transform duration-300"></i>
                        </button>
                        
                        <div class="accordion-content bg-white px-6 border-t border-gray-50">
                            <div class="py-4 space-y-4">
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div>
                                        <h4 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">Available Dosages/Forms</h4>
                                        <div class="text-sm text-gray-800">${med.forms}</div>
                                    </div>
                                    <div>
                                        <h4 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">Indications</h4>
                                        <div class="text-sm text-gray-800">${med.ind}</div>
                                    </div>
                                </div>
                                
                                <div class="bg-gray-50 rounded-lg p-3 border border-gray-100">
                                    <h4 class="text-xs font-bold text-blue-600 uppercase tracking-wider mb-1 flex items-center gap-1">
                                        <i data-lucide="syringe" class="w-3 h-3"></i> Dosing
                                    </h4>
                                    <div class="text-sm text-gray-800 font-medium">${med.dose}</div>
                                </div>

                                <div>
                                    <h4 class="text-xs font-bold text-red-500 uppercase tracking-wider mb-1 flex items-center gap-1">
                                        <i data-lucide="ban" class="w-3 h-3"></i> Contraindications
                                    </h4>
                                    <div class="text-sm text-gray-700">${med.contra}</div>
                                </div>

                                <div class="bg-amber-50 border-l-4 border-amber-400 p-3 rounded-r-lg mt-4">
                                    <div class="flex items-start gap-2">
                                        <i data-lucide="lightbulb" class="w-5 h-5 text-amber-500 mt-0.5"></i>
                                        <div>
                                            <h4 class="text-sm font-bold text-amber-800">Pro Tip</h4>
                                            <div class="text-sm text-amber-900 mt-1">${med.protip}</div>
                                        </div>
                                    </div>
                                </div>

                                ${
                                    med.details && med.details.length
                                        ? `
                                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 pt-2">
                                        ${med.details
                                            .map(
                                                (detail) => `
                                            <div class="rounded-lg border border-gray-100 bg-white p-3">
                                                <h4 class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-1 flex items-center gap-1">
                                                    ${
                                                        detail.icon
                                                            ? `<i data-lucide="${detail.icon}" class="w-3 h-3"></i>`
                                                            : ""
                                                    }
                                                    ${detail.title}
                                                </h4>
                                                <div class="text-sm text-gray-700">${detail.content}</div>
                                            </div>
                                        `
                                            )
                                            .join("")}
                                    </div>
                                `
                                        : ""
                                }
                            </div>
                        </div>
                    `;
                    medList.appendChild(medItem);
                });

                catDiv.appendChild(medList);
                container.appendChild(catDiv);
            });

            resultsCount.textContent = `Showing ${totalMeds} medications`;
            if (window.lucide && typeof window.lucide.createIcons === "function") {
                window.lucide.createIcons();
            }
        }

        // Accordion Logic
        window.toggleAccordion = function(button) {
            const content = button.nextElementSibling;
            const icon =
                button.querySelector('.chevron-icon') ||
                button.querySelector('[data-lucide="chevron-down"]') ||
                button.querySelector('svg');
            
            if (content.classList.contains('expanded')) {
                content.classList.remove('expanded');
                if (icon) icon.style.transform = 'rotate(0deg)';
                content.style.paddingTop = '0';
                content.style.paddingBottom = '0';
            } else {
                content.classList.add('expanded');
                if (icon) icon.style.transform = 'rotate(180deg)';
                content.style.paddingTop = '1rem';
                content.style.paddingBottom = '1rem';
            }
        };

        // Expand/Collapse All
        expandAllBtn.addEventListener('click', () => {
            const contents = document.querySelectorAll('.accordion-content');
            
            allExpanded = !allExpanded;
            
            contents.forEach((content) => {
                const button = content.previousElementSibling;
                const icon =
                    (button && button.querySelector('.chevron-icon')) ||
                    (button && button.querySelector('[data-lucide="chevron-down"]')) ||
                    (button && button.querySelector('svg'));
                if (allExpanded) {
                    content.classList.add('expanded');
                    content.style.paddingTop = '1rem';
                    content.style.paddingBottom = '1rem';
                    if (icon) icon.style.transform = 'rotate(180deg)';
                } else {
                    content.classList.remove('expanded');
                    content.style.paddingTop = '0';
                    content.style.paddingBottom = '0';
                    if (icon) icon.style.transform = 'rotate(0deg)';
                }
            });

            expandAllBtn.textContent = allExpanded ? "Collapse All Categories" : "Expand All Categories";
        });

        // Search Filter Logic
        searchInput.addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            
            if (!searchTerm) {
                renderMedications(medData);
                return;
            }

            const filteredData = medData.map(category => {
                // Check if category name matches
                const catMatch = category.category.toLowerCase().includes(searchTerm);
                
                // Filter medications
                const matchedMeds = category.medications.filter((med) => {
                    if (catMatch) return true;

                    const detailsText = (med.details || [])
                        .map((detail) => `${detail.title} ${detail.content}`)
                        .join(" ");
                    const haystack = [
                        med.name,
                        med.forms,
                        med.ind,
                        med.dose,
                        med.contra,
                        med.protip,
                        detailsText
                    ]
                        .filter(Boolean)
                        .join(" ")
                        .toLowerCase();

                    return haystack.includes(searchTerm);
                });

                return {
                    ...category,
                    medications: matchedMeds
                };
            }).filter(category => category.medications.length > 0);

            renderMedications(filteredData);
            
            // Automatically expand results during search for better UX
            if (searchTerm.length > 1 && filteredData.length > 0) {
                 setTimeout(() => {
                    const contents = document.querySelectorAll('.accordion-content');
                    contents.forEach((content) => {
                        const button = content.previousElementSibling;
                        const icon =
                            (button && button.querySelector('.chevron-icon')) ||
                            (button && button.querySelector('[data-lucide="chevron-down"]')) ||
                            (button && button.querySelector('svg'));
                        content.classList.add('expanded');
                        content.style.paddingTop = '1rem';
                        content.style.paddingBottom = '1rem';
                        if (icon) icon.style.transform = 'rotate(180deg)';
                    });
                    allExpanded = true;
                    expandAllBtn.textContent = "Collapse All Categories";
                 }, 50);
            }
        });

        // Initial Render
        renderMedications(medData);
    </script>
</body>
</html>
